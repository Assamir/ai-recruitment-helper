# Pre-commit quality gates (test-plan §5: lint + typecheck + scoped tests).
# Install: npm install (prepare → lefthook install) or npx lefthook install

pre-commit:
  parallel: true
  jobs:
    - name: eslint (staged)
      run: npx eslint --max-warnings 0 --no-warn-ignored --fix {staged_files}
      glob: "*.{ts,tsx,astro}"

    - name: astro check
      run: npm run typecheck
      glob:
        - "src/**/*.{ts,tsx,astro}"
        - "tests/**/*.{ts,tsx}"

    - name: vitest related (risk areas)
      run: node scripts/lefthook-related-tests.mjs
      glob:
        - "src/lib/llm/**"
        - "src/lib/analysis/**"
        - "src/components/analysis/**"
        - "src/lib/anonymizer/**"
        - "src/lib/cv-parser/**"
        - "src/pages/api/**"
        - "tests/lib/**"
        - "tests/rls/**"
        - "tests/components/**"
